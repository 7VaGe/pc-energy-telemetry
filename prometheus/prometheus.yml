# prometheus.yml
# Scrapes the native Windows exporter via host.docker.internal.
# host.docker.internal resolves to the Windows host IP from within Docker containers.

global:
  scrape_interval:     2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'telemetry-exporter'
    static_configs:
      - targets: ['host.docker.internal:8000']