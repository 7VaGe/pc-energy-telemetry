# docker-compose.yml
# Prometheus and Grafana run containerized.
# The Python exporter runs natively on Windows to access NVIDIA drivers via NVML.
# Prometheus reaches the native exporter via host.docker.internal:8000.

services:

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: telemetry-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.out-of-order.time-window=10m'
    networks:
      - telemetry

  grafana:
    image: grafana/grafana:10.4.2
    container_name: telemetry-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - telemetry

volumes:
  prometheus_data:
  grafana_data:

networks:
  telemetry:
    driver: bridge